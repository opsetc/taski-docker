volumes:
  pg_data_production:
  static_volume:

services:
  db:
    image: postgres:13
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data

  backend:
    image: opsetc/taski_backend
    env_file: .env
    depends_on:
      - db
    volumes:
      - static_volume:/backend_static

  frontend:
    image: opsetc/taski_frontend
    command: cp -r /app/build/. /frontend_static/
    env_file: .env
    volumes:
      - static_volume:/frontend_static

  gateway:
    image: opsetc/taski_gateway
    env_file: .env
    depends_on:
      - backend
      - frontend
    ports:
      - 8000:80
    volumes:
      - static_volume:/staticfiles/
